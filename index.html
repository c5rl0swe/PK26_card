<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>President's Kaizen Card Generator</title>

    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #121212;
            font-family: 'Hanken Grotesk', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: white;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            background: #222;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            justify-content: center;
            align-items: center;
        }

        input[type="text"] {
            padding: 12px;
            font-size: 14px;
            border: 1px solid #444;
            background: #111;
            color: white;
            border-radius: 6px;
            width: 200px;
            font-family: 'Hanken Grotesk', sans-serif;
        }

        .instruction-pill {
            padding: 12px 24px;
            background: #FFC400;
            font-weight: 800;
            color: #000;
            border-radius: 50px;
            text-transform: uppercase;
            font-size: 14px;
            user-select: none;
            cursor: default;
        }

        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            background-color: #2b2b2b;
        }
    </style>
</head>
<body>

<div class="controls">
    <input type="file" id="imageUpload" accept="image/*">
    <input type="text" id="nameInput" placeholder="Enter Name">
    <input type="text" id="jobInput" placeholder="Enter Job Title">
    <div class="instruction-pill">Right Click to Save</div>
</div>

<canvas id="canvas" width="1080" height="1080"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let userImg = null;
    let logo = new Image();

    logo.onload = draw;
    logo.onerror = () => draw(); 
    logo.src = "logo.png"; 

    document.getElementById('imageUpload').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = event => {
            const img = new Image();
            img.onload = () => { userImg = img; draw(); };
            img.src = event.target.result;
        };
        if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
    });

    document.getElementById('nameInput').addEventListener('input', draw);
    document.getElementById('jobInput').addEventListener('input', draw);
    document.fonts.ready.then(draw);

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Background Gradient[cite: 2]
        const grad = ctx.createRadialGradient(540, 540, 100, 540, 540, 900);
        grad.addColorStop(0, "#424242");
        grad.addColorStop(1, "#1a1a1a");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Logo[cite: 2]
        if (logo.complete && logo.naturalWidth > 0) {
            const maxWidthLogo = 420;
            const maxHeightLogo = 180;
            const ratio = Math.min(maxWidthLogo / logo.width, maxHeightLogo / logo.height);
            ctx.drawImage(logo, 70, 70, logo.width * ratio, logo.height * ratio);
        }

        // 3. Dividers
        ctx.strokeStyle = "rgba(255,255,255,0.15)";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(70, 290); ctx.lineTo(1010, 290); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(70, 780); ctx.lineTo(1010, 780); ctx.stroke();

        // 4. Profile Photo[cite: 2]
        const cx = 310; const cy = 540; const r = 185; 
        if (userImg) {
            ctx.save();
            ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.clip();
            const scale = Math.max(r * 2 / userImg.width, r * 2 / userImg.height);
            ctx.drawImage(userImg, cx - (userImg.width * scale)/2, cy - (userImg.height * scale)/2, userImg.width * scale, userImg.height * scale);
            ctx.restore();
        }

        // Yellow Ring
        ctx.strokeStyle = "#FFC400";
        ctx.lineWidth = 12;
        ctx.beginPath(); ctx.arc(cx, cy, r + 6, 0, Math.PI * 2); ctx.stroke();

        // 5. Dynamic Text Scaling[cite: 2]
        const textX = 550;
        const textMaxWidth = 480;

        // --- NAME ---
        const name = (document.getElementById('nameInput').value || "NAME SURNAME").toUpperCase();
        let nameFontSize = 80;
        ctx.textAlign = "left";
        ctx.fillStyle = "#FFFFFF";
        
        do {
            ctx.font = `800 ${nameFontSize}px 'Hanken Grotesk'`;
            nameFontSize--;
        } while (ctx.measureText(name).width > textMaxWidth && nameFontSize > 20);
        
        ctx.fillText(name, textX, 520);

        // Yellow Underline
        ctx.fillStyle = "#FFC400";
        ctx.fillRect(textX, 545, 380, 6);

        // --- JOB TITLE ---
        const job = document.getElementById('jobInput').value || "Job Title Here";
        let jobFontSize = 44;
        ctx.fillStyle = "#bbbbbb";

        do {
            ctx.font = `400 ${jobFontSize}px 'Hanken Grotesk'`;
            jobFontSize--;
        } while (ctx.measureText(job).width > textMaxWidth && jobFontSize > 15);

        ctx.fillText(job, textX, 615);

        // 6. Footer Branding & Hashtags[cite: 2]
        ctx.textAlign = "left";
        ctx.fillStyle = "#FFFFFF";
        ctx.font = "800 48px 'Hanken Grotesk'";
        ctx.fillText("ALL IN!! LET'S GO!", 70, 845);
        ctx.fillStyle = "#FFC400";
        ctx.fillRect(70, 865, 365, 5);
        ctx.fillStyle = "#999999";
        ctx.font = "400 38px 'Hanken Grotesk'";
        ctx.fillText("May 4th – 8th", 70, 925);

        ctx.textAlign = "right";
        ctx.fillStyle = "#FFFFFF";
        ctx.font = "700 34px 'Hanken Grotesk'";
        ctx.fillText("PRESIDENT'S", 1010, 835);
        ctx.font = "800 130px 'Hanken Grotesk'";
        ctx.fillText("KAIZEN", 1010, 950);

        ctx.textAlign = "center";
        ctx.fillStyle = "#777777";
        ctx.font = "700 30px 'Hanken Grotesk'";
        ctx.fillText("#PresidentsKaizen2026   ▪   #FBSinAction", 540, 1040);
    }
</script>

</body>
</html>
